appId: com.infinixel.cipreengo
---
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 90000
- tapOn:
    id: login-email
- inputText: ${E2E_EMAIL}
- tapOn:
    id: login-password
- inputText: ${E2E_PASSWORD}
- tapOn:
    id: login-submit
- extendedWaitUntil:
    visible:
      text: "Community, tab.*"
    timeout: 90000
